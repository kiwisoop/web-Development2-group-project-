<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('회원가입')}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="container">
    <section class="auth-shell">
        <div class="card auth-card">
            <h1 class="auth-title">회원가입</h1>
            <p class="auth-subtitle">새 계정을 만들고 관심 팀 경기를 추천받으세요.</p>
            <p th:if="${error}" th:text="${error}" class="error-box">회원가입 오류</p>
            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="grid">
                <div class="form-group">
                    <label class="form-label">아이디</label>
                    <input class="input" type="text" th:field="*{username}">
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error"></p>
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input class="input" type="password" th:field="*{password}">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></p>
                </div>
                <div class="form-group">
                    <label class="form-label">닉네임</label>
                    <input class="input" type="text" th:field="*{nickname}">
                    <p th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" class="error"></p>
                </div>
                <button class="btn btn-primary btn-block" type="submit">가입하기</button>
            </form>
            <p style="text-align:center; margin-top:16px">
                <a class="section-link" th:href="@{/login}">이미 계정이 있나요? 로그인</a>
            </p>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
