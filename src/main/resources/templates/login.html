<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('로그인')}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="container">
    <section class="auth-shell">
        <div class="card auth-card">
            <h1 class="auth-title">로그인</h1>
            <p class="auth-subtitle">계정으로 로그인하고 관심 팀을 관리하세요.</p>
            <p th:if="${error}" th:text="${error}" class="error-box">로그인 오류</p>
            <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="grid">
                <div class="form-group">
                    <label class="form-label">아이디</label>
                    <input class="input" type="text" th:field="*{username}" placeholder="아이디를 입력하세요">
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error"></p>
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input class="input" type="password" th:field="*{password}" placeholder="비밀번호를 입력하세요">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></p>
                </div>
                <button class="btn btn-primary btn-block" type="submit">로그인</button>
            </form>
            <p style="text-align:center; margin-top:16px">
                <a class="section-link" th:href="@{/register}">회원가입</a>
            </p>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
