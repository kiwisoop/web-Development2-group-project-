<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Esports')}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="container">
    <div class="page-head">
        <p class="eyebrow">Sport</p>
        <h1 class="page-title">e스포츠 · Esports</h1>
        <p class="page-desc">리그와 팀을 확인하고 관심 팀을 등록하세요.</p>
    </div>

    <section class="section">
        <div class="card card-pad">
            <h2 class="section-title">리그 정보</h2>
            <div class="grid grid-3" style="margin-top:14px">
                <article class="card card-pad" th:each="l : ${leagues}">
                    <h3 th:text="${l.leagueName}">League</h3>
                    <p class="card-desc">
                        <span th:text="${l.season}">2026</span>
                        <span th:if="${l.country}"> · <span th:text="${l.country}">KR</span></span>
                    </p>
                </article>
                <p class="empty-state" th:if="${leagues == null or #lists.isEmpty(leagues)}">리그가 없습니다.</p>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="section-head"><h2 class="section-title">팀 목록</h2></div>
        <div th:replace="~{fragments/teamCards :: cards(teams=${teams}, favoriteTeamIds=${favoriteTeamIds}, loginUserId=${loginUserId})}"></div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
