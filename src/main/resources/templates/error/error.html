<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('오류')}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="container">
    <section class="auth-shell">
        <div class="card auth-card empty-state">
            <div class="empty-icon">⚠️</div>
            <h1>오류가 발생했습니다.</h1>
            <p th:text="${error} ?: '요청한 페이지를 찾을 수 없거나 오류가 발생했습니다.'">오류 메시지</p>
            <p th:if="${status}">상태 코드: <strong th:text="${status}">500</strong></p>
            <a class="btn btn-primary" th:href="@{/}">홈으로 돌아가기</a>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
