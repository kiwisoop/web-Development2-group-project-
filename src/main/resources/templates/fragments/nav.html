<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="nav" class="header-shell">
    <nav class="nav">
        <a class="brand" th:href="@{/}">
            <span class="brand-mark">⚽</span>
            <span>Sport Analysis</span>
        </a>
        <div class="nav-menu">
            <a class="nav-link" th:href="@{/}">홈</a>
            <a class="nav-link" th:href="@{/matches}">경기</a>
            <a class="nav-link" th:href="@{/sports/soccer}">축구</a>
            <a class="nav-link" th:href="@{/sports/baseball}">야구</a>
            <a class="nav-link" th:href="@{/sports/esports}">e스포츠</a>
            <a class="nav-link" th:href="@{/favorites}">관심 팀</a>
            <a class="nav-link" th:href="@{/api-test}">API 테스트</a>
        </div>
        <div class="nav-actions">
            <span class="user-chip" th:if="${session.LOGIN_USERNAME}" th:text="${session.LOGIN_USERNAME}">demo</span>
            <a class="btn btn-outline" th:if="${session.LOGIN_USERNAME}" th:href="@{/logout}">로그아웃</a>
            <a class="btn btn-outline" th:unless="${session.LOGIN_USERNAME}" th:href="@{/login}">로그인</a>
            <a class="btn btn-primary" th:unless="${session.LOGIN_USERNAME}" th:href="@{/register}">회원가입</a>
        </div>
    </nav>
</header>
</body>
</html>
