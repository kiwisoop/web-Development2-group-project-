spring.application.name=web-sport
spring.config.import=optional:classpath:application-local.properties

# === Oracle DB (override via env: DB_URL, DB_USERNAME, DB_PASSWORD) ===
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:0}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=com.sport.web_sport.config.PreserveQuotedNamingStrategy

# === Server ===
server.port=8080
server.servlet.session.timeout=30m

# === Groq (override via env: GROQ_API_KEY, GROQ_MODEL) ===
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# === Gemini (optional, used by LCK esports analysis) ===
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}

# === Cito API (optional LCK data source) ===
cito.api.key=${CITO_API_KEY:}
cito.api.base-url=${CITO_API_BASE_URL:https://api.citoapi.com/api/v1}

# === Riot/LCK persisted API (optional LCK data source) ===
riot.api.key=${RIOT_API_KEY:}
